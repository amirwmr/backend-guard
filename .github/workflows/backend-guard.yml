# managed-by-backend-guard
name: Backend Guard

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend-guard
        run: python -m pip install --upgrade pip backend-guard
      - name: Install project tooling
        run: backend-guard install --yes
      - name: Backend Guard audit
        run: backend-guard audit
